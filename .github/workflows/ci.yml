name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test and validate
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Python tests
        run: python3 -m unittest discover -s tests

      - name: Compile Python files
        run: python3 -m py_compile backend/lambda_function.py tests/test_lambda_auth.py tests/test_frontend_auth.py

      - name: Check frontend JavaScript
        run: node --check frontend/app.js

      - name: Validate AWS SAM template
        run: sam validate --template-file infra/template.yaml

      - name: Build AWS SAM application
        run: sam build --template-file infra/template.yaml
