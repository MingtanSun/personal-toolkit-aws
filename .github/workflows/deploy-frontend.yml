name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      bucket_name:
        description: "S3 bucket for static frontend assets"
        required: true
        default: "davidsun-todo-frontend-2026"
      cloudfront_distribution_id:
        description: "CloudFront distribution ID to invalidate after upload"
        required: false
        default: "E26N3TMX9NZSXN"

jobs:
  deploy:
    name: Upload frontend to S3
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
      S3_BUCKET: ${{ inputs.bucket_name }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ inputs.cloudfront_distribution_id }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check frontend JavaScript
        run: node --check frontend/app.js

      - name: Upload frontend assets
        run: |
          aws s3 sync frontend/ "s3://$S3_BUCKET" \
            --exclude "config.example.js" \
            --cache-control "public, max-age=60"

      - name: Invalidate CloudFront cache
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"

      - name: Show frontend URLs
        run: |
          echo "S3 website endpoint:"
          echo "http://$S3_BUCKET.s3-website.$AWS_REGION.amazonaws.com"
          echo "CloudFront URL:"
          echo "https://d1l863cphghqlg.cloudfront.net"
